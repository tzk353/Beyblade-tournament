<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戰鬥陀螺比賽系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root{--fire:#FF4400;--gold:#FFB800;--dark:#0A0A0F;--panel:#12121A;--card:#1A1A26;--border:#2A2A3A;--text:#E8E8F0;--muted:#6B6B8A;--success:#00E676;--danger:#FF1744;--info:#00B0FF;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(255,68,0,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 90%,rgba(255,184,0,.08) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .header{position:relative;text-align:center;padding:36px 20px 24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(255,68,0,.08) 0%,transparent 100%);}
  .header-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,8vw,4rem);letter-spacing:.08em;background:linear-gradient(135deg,#FF6600,#FFB800,#FF4400);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
  .header-sub{font-size:.85rem;color:var(--muted);letter-spacing:.2em;margin-top:6px;}
  .mode-bar{display:flex;justify-content:center;gap:8px;padding:20px;position:relative;z-index:1;}
  .mode-btn{padding:10px 28px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;}
  .mode-btn.active{background:var(--fire);border-color:var(--fire);color:#fff;font-weight:700;box-shadow:0 0 20px rgba(255,68,0,.4);}
  .view{display:none;padding:0 20px 80px;position:relative;z-index:1;}.view.active{display:block;}
  .max-w{max-width:680px;margin:0 auto;}
  .sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;color:var(--gold);margin:28px 0 14px;display:flex;align-items:center;gap:10px;}
  .sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
  .card-accent{border-left:3px solid var(--fire);}
  .field-label{font-size:.8rem;color:var(--muted);letter-spacing:.1em;margin-bottom:6px;display:block;}
  .field-input{width:100%;background:var(--panel);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:1rem;padding:12px 14px;outline:none;transition:border-color .2s;}
  .field-input:focus{border-color:var(--fire);}.field-input::placeholder{color:var(--muted);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;border-radius:10px;border:none;font-family:'Noto Sans TC',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;width:100%;}
  .btn-primary{background:linear-gradient(135deg,#FF4400,#FF6600);color:#fff;box-shadow:0 4px 20px rgba(255,68,0,.3);}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-secondary{background:var(--panel);color:var(--text);border:1.5px solid var(--border);}
  .btn-secondary:hover{border-color:var(--gold);color:var(--gold);}
  .btn-gold{background:linear-gradient(135deg,#FFB800,#FF8800);color:#000;font-weight:900;}
  .btn-sm{padding:8px 18px;font-size:.82rem;width:auto;border-radius:8px;}
  .btn-danger{background:rgba(255,23,68,.15);color:var(--danger);border:1.5px solid rgba(255,23,68,.3);}
  .btn-success{background:rgba(0,230,118,.1);color:var(--success);border:1.5px solid rgba(0,230,118,.3);}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700;}
  .badge-success{background:rgba(0,230,118,.12);color:var(--success);border:1px solid rgba(0,230,118,.3);}
  .badge-gold{background:rgba(255,184,0,.15);color:var(--gold);border:1px solid rgba(255,184,0,.3);}
  .badge-muted{background:rgba(107,107,138,.15);color:var(--muted);border:1px solid rgba(107,107,138,.25);}
  .badge-bronze{background:rgba(180,100,30,.2);color:#CD7F32;border:1px solid rgba(180,100,30,.35);}
  .player-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .player-item:last-child{border-bottom:none;}
  .player-num{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--fire);min-width:40px;text-align:center;}
  .player-name{flex:1;font-weight:500;}
  .match-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;position:relative;}
  .match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);border-radius:3px 0 0 3px;}
  .match-card.active::before{background:var(--gold);}
  .match-card.done::before{background:var(--muted);}
  .match-card.bronze::before{background:#CD7F32;}
  .match-card.final::before{background:var(--fire);}
  .match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .match-id{font-size:.72rem;color:var(--muted);letter-spacing:.1em;}
  .vs-row{display:flex;align-items:center;gap:10px;}
  .vs-player{flex:1;background:var(--card);border-radius:8px;padding:10px 12px;text-align:center;}
  .vs-player.winner{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);}
  .vs-player.loser{opacity:.45;}
  .vs-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--fire);line-height:1;}
  .vs-name{font-size:.78rem;color:var(--muted);margin-top:2px;}
  .vs-sep{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--muted);}
  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .toast{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 22px;font-size:.9rem;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;max-width:90vw;text-align:center;}
  .toast.success{border-color:rgba(0,230,118,.4);color:var(--success);}
  .toast.error{border-color:rgba(255,23,68,.4);color:var(--danger);}
  .toast.info{border-color:rgba(0,176,255,.4);color:var(--info);}
  @keyframes toastIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes toastOut{to{opacity:0;transform:translateY(16px);}}
  .checkin-hero{text-align:center;padding:32px 0 24px;}
  .checkin-hero .icon{font-size:4rem;margin-bottom:12px;display:block;}
  .checkin-hero h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em;color:var(--gold);}
  .checkin-hero p{color:var(--muted);font-size:.9rem;margin-top:6px;}
  .my-status{background:linear-gradient(135deg,rgba(255,68,0,.1),rgba(255,184,0,.06));border:1px solid rgba(255,68,0,.25);border-radius:16px;padding:24px;text-align:center;margin-bottom:12px;}
  .my-num{font-family:'Bebas Neue',sans-serif;font-size:5rem;line-height:1;background:linear-gradient(135deg,#FF4400,#FFB800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .my-label{font-size:.8rem;color:var(--muted);letter-spacing:.15em;margin-top:4px;}
  .match-notice{background:rgba(0,176,255,.06);border:1px solid rgba(0,176,255,.25);border-radius:14px;padding:20px;text-align:center;margin-bottom:14px;animation:pulse-border 2s infinite;}
  @keyframes pulse-border{0%,100%{border-color:rgba(0,176,255,.25);}50%{border-color:rgba(0,176,255,.6);}}
  .match-notice h3{color:var(--info);font-size:1.1rem;margin-bottom:8px;}
  .opp-num{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:var(--gold);line-height:1;}
  .standby-notice{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.35);border-radius:14px;padding:20px;text-align:center;margin-bottom:14px;animation:pulse-gold 1.5s infinite;}
  @keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(255,184,0,0);}50%{box-shadow:0 0 0 6px rgba(255,184,0,.1);}}
  .standby-notice h3{color:var(--gold);font-size:1.1rem;}
  .standby-notice p{color:var(--muted);font-size:.85rem;margin-top:6px;}
  /* 此機已報到選手頁籤 */
  .my-tabs{margin-bottom:12px;}
  .my-tabs-label{font-size:.75rem;color:var(--muted);letter-spacing:.08em;margin-bottom:8px;}
  .my-tabs-row{display:flex;flex-wrap:wrap;gap:8px;}
  .my-tab-btn{padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--panel);color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .my-tab-btn.active{border-color:var(--fire);background:var(--fire);color:#fff;}
  /* 統計 */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:1;}
  .stat-num.fire{color:var(--fire);}.stat-num.gold{color:var(--gold);}.stat-num.success{color:var(--success);}
  .stat-label{font-size:.72rem;color:var(--muted);margin-top:4px;letter-spacing:.08em;}
  /* 頒獎台 */
  .podium-wrap{background:linear-gradient(135deg,rgba(255,184,0,.08),rgba(255,68,0,.05));border:1px solid rgba(255,184,0,.2);border-radius:16px;padding:24px;margin-bottom:16px;}
  .podium-row{display:flex;flex-direction:column;gap:10px;}
  .podium-item{display:flex;align-items:center;gap:14px;background:var(--panel);border-radius:12px;padding:14px 16px;border:1px solid var(--border);}
  .podium-item.rank1{border-color:rgba(255,184,0,.5);background:rgba(255,184,0,.06);}
  .podium-item.rank2{border-color:rgba(192,192,192,.4);}
  .podium-item.rank3{border-color:rgba(205,127,50,.4);}
